services:
  api-gateway:
    container_name: iredo-api-gateway
    build:
      context: ./services/api-gateway
    env_file:
      - ./services/api-gateway/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    restart: unless-stopped

  mongodb:
    container_name: iredo-mongodb
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: furnituredatabase
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./infrastructure/databases/init-mongo.js:/docker-entrypoint-initdb.d/01-init.js
    restart: unless-stopped

  product-view:
    container_name: iredo-product-view
    build:
      context: ./services/product-view/src/GraphProductView
    env_file:
      - ./services/product-view/.env
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "4200:8080"
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped

  client:
    container_name: iredo-client
    build:
      context: ./client
      args:
        VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL}
    env_file:
      - ./client/.env
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT}:80"
    restart: unless-stopped

volumes:
  mongodb-data:
