schema {
  query: Query
}

type Category {
  _Id: String!
  id: String
  name: String
  subcat: Subcategory
}

type Color {
  _Id: String!
  id: String
  name: String
  href: String
}

type Furniture {
  id: String
  salesPostGuid: String
  guid: String
  personId: String
  title: String
  description: String
  size: String
  quantity: String
  price: Int!
  condition: String
  zip_code: String
  status: Status
  color: Color
  category: Category
  images: [Image!]
}

type Image {
  _Id: String!
  id: String
  url: String
}

type Query {
  allFurniture(order: [FurnitureSortInput!] @cost(weight: "10") where: FurnitureFilterInput @cost(weight: "10")): [Furniture!]! @cost(weight: "10")
  furnitureById(id: String!): Furniture! @cost(weight: "10")
}

type Status {
  _Id: String!
  removed: Boolean!
  date: DateTime
}

type Subcategory {
  _Id: String!
  id: String
  name: String
}

input BooleanOperationFilterInput {
  eq: Boolean @cost(weight: "10")
  neq: Boolean @cost(weight: "10")
}

input CategoryFilterInput {
  and: [CategoryFilterInput!]
  or: [CategoryFilterInput!]
  _Id: StringOperationFilterInput
  id: StringOperationFilterInput
  name: StringOperationFilterInput
  subcat: SubcategoryFilterInput
}

input CategorySortInput {
  _Id: SortEnumType @cost(weight: "10")
  id: SortEnumType @cost(weight: "10")
  name: SortEnumType @cost(weight: "10")
  subcat: SubcategorySortInput @cost(weight: "10")
}

input ColorFilterInput {
  and: [ColorFilterInput!]
  or: [ColorFilterInput!]
  _Id: StringOperationFilterInput
  id: StringOperationFilterInput
  name: StringOperationFilterInput
  href: StringOperationFilterInput
}

input ColorSortInput {
  _Id: SortEnumType @cost(weight: "10")
  id: SortEnumType @cost(weight: "10")
  name: SortEnumType @cost(weight: "10")
  href: SortEnumType @cost(weight: "10")
}

input DateTimeOperationFilterInput {
  eq: DateTime @cost(weight: "10")
  neq: DateTime @cost(weight: "10")
  in: [DateTime] @cost(weight: "10")
  nin: [DateTime] @cost(weight: "10")
  gt: DateTime @cost(weight: "10")
  ngt: DateTime @cost(weight: "10")
  gte: DateTime @cost(weight: "10")
  ngte: DateTime @cost(weight: "10")
  lt: DateTime @cost(weight: "10")
  nlt: DateTime @cost(weight: "10")
  lte: DateTime @cost(weight: "10")
  nlte: DateTime @cost(weight: "10")
}

input FurnitureFilterInput {
  and: [FurnitureFilterInput!]
  or: [FurnitureFilterInput!]
  id: StringOperationFilterInput
  salesPostGuid: StringOperationFilterInput
  guid: StringOperationFilterInput
  personId: StringOperationFilterInput
  title: StringOperationFilterInput
  description: StringOperationFilterInput
  size: StringOperationFilterInput
  quantity: StringOperationFilterInput
  price: IntOperationFilterInput
  condition: StringOperationFilterInput
  zip_code: StringOperationFilterInput
  status: StatusFilterInput
  color: ColorFilterInput
  category: CategoryFilterInput
  images: ListFilterInputTypeOfImageFilterInput
}

input FurnitureSortInput {
  id: SortEnumType @cost(weight: "10")
  salesPostGuid: SortEnumType @cost(weight: "10")
  guid: SortEnumType @cost(weight: "10")
  personId: SortEnumType @cost(weight: "10")
  title: SortEnumType @cost(weight: "10")
  description: SortEnumType @cost(weight: "10")
  size: SortEnumType @cost(weight: "10")
  quantity: SortEnumType @cost(weight: "10")
  price: SortEnumType @cost(weight: "10")
  condition: SortEnumType @cost(weight: "10")
  zip_code: SortEnumType @cost(weight: "10")
  status: StatusSortInput @cost(weight: "10")
  color: ColorSortInput @cost(weight: "10")
  category: CategorySortInput @cost(weight: "10")
}

input ImageFilterInput {
  and: [ImageFilterInput!]
  or: [ImageFilterInput!]
  _Id: StringOperationFilterInput
  id: StringOperationFilterInput
  url: StringOperationFilterInput
}

input IntOperationFilterInput {
  eq: Int @cost(weight: "10")
  neq: Int @cost(weight: "10")
  in: [Int] @cost(weight: "10")
  nin: [Int] @cost(weight: "10")
  gt: Int @cost(weight: "10")
  ngt: Int @cost(weight: "10")
  gte: Int @cost(weight: "10")
  ngte: Int @cost(weight: "10")
  lt: Int @cost(weight: "10")
  nlt: Int @cost(weight: "10")
  lte: Int @cost(weight: "10")
  nlte: Int @cost(weight: "10")
}

input ListFilterInputTypeOfImageFilterInput {
  all: ImageFilterInput @cost(weight: "10")
  none: ImageFilterInput @cost(weight: "10")
  some: ImageFilterInput @cost(weight: "10")
  any: Boolean @cost(weight: "10")
}

input StatusFilterInput {
  and: [StatusFilterInput!]
  or: [StatusFilterInput!]
  _Id: StringOperationFilterInput
  removed: BooleanOperationFilterInput
  date: DateTimeOperationFilterInput
}

input StatusSortInput {
  _Id: SortEnumType @cost(weight: "10")
  removed: SortEnumType @cost(weight: "10")
  date: SortEnumType @cost(weight: "10")
}

input StringOperationFilterInput {
  and: [StringOperationFilterInput!]
  or: [StringOperationFilterInput!]
  eq: String @cost(weight: "10")
  neq: String @cost(weight: "10")
  contains: String @cost(weight: "20")
  ncontains: String @cost(weight: "20")
  in: [String] @cost(weight: "10")
  nin: [String] @cost(weight: "10")
  startsWith: String @cost(weight: "20")
  nstartsWith: String @cost(weight: "20")
  endsWith: String @cost(weight: "20")
  nendsWith: String @cost(weight: "20")
}

input SubcategoryFilterInput {
  and: [SubcategoryFilterInput!]
  or: [SubcategoryFilterInput!]
  _Id: StringOperationFilterInput
  id: StringOperationFilterInput
  name: StringOperationFilterInput
}

input SubcategorySortInput {
  _Id: SortEnumType @cost(weight: "10")
  id: SortEnumType @cost(weight: "10")
  name: SortEnumType @cost(weight: "10")
}

enum SortEnumType {
  ASC
  DESC
}

"The purpose of the `cost` directive is to define a `weight` for GraphQL types, fields, and arguments. Static analysis can use these weights when calculating the overall cost of a query or response."
directive @cost("The `weight` argument defines what value to add to the overall cost for every appearance, or possible appearance, of a type, field, argument, etc." weight: String!) on SCALAR | OBJECT | FIELD_DEFINITION | ARGUMENT_DEFINITION | ENUM | INPUT_FIELD_DEFINITION

"The `@specifiedBy` directive is used within the type system definition language to provide a URL for specifying the behavior of custom scalar definitions."
directive @specifiedBy("The specifiedBy URL points to a human-readable specification. This field will only read a result for scalar types." url: String!) on SCALAR

"The `DateTime` scalar represents an ISO-8601 compliant date time type."
scalar DateTime @specifiedBy(url: "https:\/\/www.graphql-scalars.com\/date-time")