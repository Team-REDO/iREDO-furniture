services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: ${CONTAINER_NAME}
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${USER_DB_PASSWORD}
    ports:
      - "${USER_DB_PORT}:1433"

  user-service:
    build: ./
    container_name: REDO_Service_User
    ports:
      - "${USER_API_PORT}:8080"
    env_file:
      - .env
    environment:
     - ASPNETCORE_ENVIRONMENT=Development
     - ConnectionStrings__DefaultConnection=Server=mssql,1433;Database=${USER_DB_NAME};User=${USER_DB_USER};Password=${USER_DB_PASSWORD};TrustServerCertificate=True
    depends_on:
      - mssql
